openapi: 3.1.0

info:
  title: Learning Platform API
  version: 1.0.0
  description: API Documentation for Admin Panel

servers:
  - url: http://localhost:5001

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Admin Auth
  - name: Blog
  - name: Profile
  - name: Member
  - name: Course
  - name: LiteratureCourse
  - name: CourseLanding
  - name: Course-Marketplace
  - name: Book-Store-Course
  - name: Admin Landing

paths:
  # --- ADMIN AUTH ---
  /api/v1/admin/auth/login:
    post:
      tags:
        - Admin Auth
      summary: Admin Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@elearning.com
                password:
                  type: string
                  example: Admin@123
      responses:
        '200':
          description: Login Success

  /api/v1/admin/auth/forgot-password:
    post:
      tags:
        - Admin Auth
      summary: Forgot Password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Reset link sent

  /api/v1/admin/auth/reset-password/{token}:
    post:
      tags:
        - Admin Auth
      summary: Reset Password
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Password reset success

  # --- BLOG SECTION ---
  /api/v1/admin/blogs/add:
     post:
      tags:
        - Blog
      summary: Create Blog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                content:
                  type: string
                image:
                  type: string
                category:
                  type: string
                author:
                  type: object
                  properties:
                    name:
                      type: string
                    image:
                      type: string
                tags:
                  type: array
                  items:
                    type: string
                isFeatured:
                  type: boolean
                isMarketing:
                  type: boolean
                views:
                  type: integer
                readTime:
                  type: string
            example:
              title: "Why Swift UI Should Be on the Radar of Every Mobile Developer"
              slug: "swift-ui-mobile-developers"
              description: "SwiftUI helps developers build modern iOS apps faster"
              content: "Full content here..."
              image: "https://example.com/image.jpg"
              category: "Mobile Development"
              author:
                name: "John Doe"
                image: "https://example.com/author.jpg"
              tags: ["SwiftUI", "iOS", "Mobile"]
              isFeatured: true
              isMarketing: true
              views: 1200
              readTime: "5 min read"
      responses:
        '201':
          description: Blog Created Successfully
  /api/v1/admin/blogs:
    get:
      tags:
        - Blog
      summary: Get All Blogs
      responses:
        '200':
          description: Success

  /api/v1/admin/blogs/{id}:
    get:
      tags:
        - Blog
      summary: Get Blog By Id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success

  /api/v1/admin/blogs/edit/{id}:
    put:
      tags:
        - Blog
      summary: Update Blog
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated successfully

  /api/v1/admin/blogs/delete/{id}:
    delete:
      tags:
        - Blog
      summary: Delete Blog
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted successfully

  # --- PROFILE SECTION ---
  /api/v1/admin/auth/profile:
    get:
      tags:
        - Profile
      summary: Get Logged In Admin Profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success

  /api/v1/admin/profile/{id}:
    get:
      tags:
        - Profile
      summary: Get Profile By Id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
    put:
      tags:
        - Profile
      summary: Update Profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated successfully
    delete:
      tags:
        - Profile
      summary: Delete Profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted successfully

