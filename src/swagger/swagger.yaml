          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
  /api/v1/admin/memberships/delete/{id}:
    delete:
      tags:
        - Member
      summary: Delete Membership
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success

  # --- COURSE SECTION ---
  /api/v1/admin/courses:
